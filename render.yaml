# Render blueprint for the FastAPI backend.
# In Render: New > Blueprint, point it at this repo. Set the secret env vars
# (OPENAI_API_KEY, REDIS_URL, CORS_ORIGINS) in the dashboard — they're marked
# sync:false so they are NOT read from this file.
services:
  - type: web
    name: resume-ranker-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7        # Render may not yet ship 3.14; 3.12 is safe
      - key: OPENAI_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false           # e.g. https://your-app.vercel.app
      # --- Cold-email feature (contact discovery + Gmail drafts) ---
      - key: APOLLO_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false           # https://<this-render-app>.onrender.com/auth/google/callback
      - key: FRONTEND_URL
        sync: false           # your Vercel URL — where OAuth redirects back to
