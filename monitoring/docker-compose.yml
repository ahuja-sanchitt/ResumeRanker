# Local observability stack: Prometheus scrapes the FastAPI /metrics endpoint,
# Grafana visualizes it.
#
#   1. Start the backend on the host:  uvicorn app.main:app --reload
#   2. From this folder:               docker compose up
#   3. Grafana:    http://localhost:3000   (admin / admin)
#      Prometheus: http://localhost:9090
#
# The Prometheus datasource is auto-provisioned in Grafana; build dashboards
# on metrics like openai_tokens_total, app_cache_events_total, http_request_seconds.
services:
  prometheus:
    image: prom/prometheus:latest
    container_name: rr-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Linux; no-op on Docker Desktop

  grafana:
    image: grafana/grafana:latest
    container_name: rr-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
